<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visitas Digital</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1b; 
            color: #e5e5e5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .card { 
            background: #272729; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 350px; 
            width: 100%; 
            border-top: 5px solid #004a94; /* Azul Uninove */
        }
        .logo-uninove {
            width: 180px;
            margin-bottom: 20px;
        }
        h1 { 
            margin: 10px 0; 
            font-size: 1.5rem; 
            color: #fff; 
        }
        p { 
            color: #a1a1a1; 
            font-size: 0.9rem; 
            margin-bottom: 25px; 
        }
        .btn { 
            display: block; 
            background: #333; 
            color: #fff; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            text-decoration: none; 
            transition: 0.3s; 
            font-weight: bold; 
            border: 1px solid #444; 
        }
        .btn:hover { 
            background: #004a94; 
            border-color: #004a94;
        }
        .footer-text {
            font-size: 0.7rem;
            color: #666;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Logo-uninove.svg/1024px-Logo-uninove.svg.png" alt="Logo Uninove" class="logo-uninove">
        
        <h1>[Seu Nome]</h1>
        <p>[Seu Cargo / Área de Atuação]</p>
        
        <a href="URL_DO_SEU_VCARD_OU_WHATSAPP" class="btn">Salvar Contato</a>
        
        <a href="LINK_DO_REPOSITORIO" class="btn">Materiais Acadêmicos</a>

        <a href="LINK_LINKEDIN" class="btn">LinkedIn</a>

        <div class="footer-text">NFC Digital Card</div>
    </div>
</body>
</html>
